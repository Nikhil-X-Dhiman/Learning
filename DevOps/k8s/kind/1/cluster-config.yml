# yaml-language-server: $schema=none

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: demo-local-cluster

nodes:
  - role: control-plane
    image: kindest/node:v1.36.1
  - role: worker
    image: kindest/node:v1.36.1
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
  - role: worker
    image: kindest/node:v1.36.1
    extraPortMappings:
      - containerPort: 80
        hostPort: 81
        protocol: TCP
  - role: worker
    image: kindest/node:v1.36.1
    extraPortMappings:
      - containerPort: 80
        hostPort: 82
        protocol: TCP

networking:
  apiServerPort: 6443
  apiServerAddress: '127.0.0.1'
  podSubnet: '10.244.0.0/16'
  serviceSubnet: '10.96.0.0/12'
